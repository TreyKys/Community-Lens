name: Cron — Daily Market Seed

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: cron-daily-seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Seed markets from sport APIs
        run: |
          curl -sSf --max-time 290 -X POST "${{ secrets.API_BASE_URL }}/api/markets/seed-daily" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
