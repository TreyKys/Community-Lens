name: Cron — Market Lock

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-market-lock
  cancel-in-progress: false

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - name: Lock due markets
        run: |
          curl -sSf -X POST "${{ secrets.API_BASE_URL }}/api/markets/lock-all" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
