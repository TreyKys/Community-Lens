name: Weekly Heartbeat Bot

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Hit heartbeat API
        run: |
          curl -X POST ${{ secrets.API_BASE_URL }}/api/admin/heartbeat \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" || true
