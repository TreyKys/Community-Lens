name: Cron — Oracle Resolve

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-oracle-resolve
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Settle locked markets via sport APIs
        run: |
          curl -sSf --max-time 280 -X POST "${{ secrets.API_BASE_URL }}/api/markets/resolve-due" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
